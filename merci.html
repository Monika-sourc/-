<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>תודה! - FinanceExpress</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
        }
        .container {
            max-width: 600px;
            background: #ffffff;
            padding: 60px 40px;
            border-radius: 2rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            border: 1px solid #e2e8f0;
        }
        .icon {
            font-size: 4.5rem;
            color: #10b981;
            margin-bottom: 20px;
        }
        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 16px;
        }
        p {
            font-size: 1.15rem;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        .btn {
            display: inline-block;
            padding: 14px 36px;
            background: #f59e0b;
            color: #0f172a;
            text-decoration: none;
            font-weight: 700;
            border-radius: 50px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            margin-top: 10px;
        }
        .btn:hover {
            background: #fbbf24;
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .footer {
            margin-top: 30px;
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .footer a {
            color: #3b82f6;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        @media (max-width: 480px) {
            .container { padding: 40px 20px; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon"><i class="fas fa-check-circle"></i></div>
        <h1>תודה! הבקשה שלך התקבלה</h1>
        <p>קיבלנו את פרטיך. ניצור איתך קשר בהקדם האפשרי.</p>
        <a href="https://monika-source.github.io/Monil/" class="btn"><i class="fas fa-home"></i> חזור לדף הבית</a>
        <div class="footer">
            <p>© 2026 FinanceExpress · <a href="mailto:bankvantex047@gmail.com">bankvantex047@gmail.com</a></p>
        </div>
    </div>
</body>
</html>
